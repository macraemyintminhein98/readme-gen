<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .container {
            max-width: 800px;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="container mx-auto bg-white shadow-lg rounded-lg p-8 space-y-6">
        <h1 class="text-4xl font-bold text-center text-gray-800">🌟 README Gen 🌟</h1>
        <p class="text-center text-gray-600">Effortlessly create professional GitHub READMEs.</p>
        
        <div class="space-y-4">
            <div>
                <label for="githubUrl" class="block text-sm font-medium text-gray-700">GitHub Repository URL:</label>
                <input type="url" id="githubUrl" placeholder="e.g., https://github.com/user/repo" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <button id="generateBtn" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                Generate README (Unlock Pro for $4.99)
            </button>
        </div>

        <div id="outputSection" class="hidden mt-6">
            <p class="text-lg font-semibold text-gray-800 mb-2">Your Generated README:</p>
            <textarea id="readmeOutput" class="w-full h-64 p-4 border border-gray-300 rounded-md bg-gray-50 text-gray-800 text-sm" readonly></textarea>
            <div class="mt-4 flex space-x-4">
                <button id="copyBtn" class="flex-1 py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700">Copy to Clipboard</button>
                <button id="downloadBtn" class="flex-1 py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">Download .md</button>
            </div>
        </div>

        <p class="text-center text-gray-500 text-xs mt-6">A product by APEX.</p>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            alert('Payment integration coming soon! This is a demo.');
            document.getElementById('outputSection').classList.remove('hidden');
            document.getElementById('readmeOutput').value = '# Demo README\n\nThis is a sample README. Full generation is available after purchase.';
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            const readmeText = document.getElementById('readmeOutput');
            readmeText.select();
            document.execCommand('copy');
            alert('README copied to clipboard!');
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const readmeText = document.getElementById('readmeOutput').value;
            const blob = new Blob([readmeText], { type: 'text/markdown' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'README.md';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
