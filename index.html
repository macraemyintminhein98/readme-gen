<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>README Gen</title><style>body{font-family:sans-serif;margin:20px;background:#f4f7f6;color:#333}h1{color:#007bff}form{background:#fff;padding:20px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,.1)}label{display:block;margin-bottom:5px;font-weight:bold}input[type="text"],textarea{width:calc(100% - 22px);padding:10px;margin-bottom:15px;border:1px solid #ddd;border-radius:4px}textarea{height:100px}button{background:#007bff;color:#fff;padding:10px 15px;border:none;border-radius:4px;cursor:pointer}button:hover{background:#0056b3}pre{background:#eee;padding:15px;border-radius:4px;white-space:pre-wrap;word-wrap:break-word}#copyBtn{margin-left:10px}footer{text-align:center;margin-top:20px;color:#777}</style></head><body><h1>README Gen</h1><p>Quickly generate a professional GitHub README.md</p><form id="readmeForm"><label for="title">Project Title:</label><input type="text" id="title" placeholder="My Awesome Project"><label for="description">Description:</label><textarea id="description" placeholder="A brief overview..."></textarea><label for="features">Features (comma-separated):</label><input type="text" id="features" placeholder="Feature 1, Feature 2"><label for="installation">Installation:</label><textarea id="installation" placeholder="`npm install`"></textarea><label for="usage">Usage:</label><textarea id="usage" placeholder="`npm start`"></textarea><label for="license">License:</label><input type="text" id="license" value="MIT" placeholder="MIT"><button type="submit">Generate README</button><button type="button" id="copyBtn">Copy to Clipboard</button></form><h2>Generated README:</h2><pre id="output"></pre><script>document.getElementById('readmeForm').addEventListener('submit', function(e) {e.preventDefault();const title = document.getElementById('title').value || 'My Awesome Project';const description = document.getElementById('description').value || 'A brief description of your project.';const features = document.getElementById('features').value.split(',').filter(f => f.trim() !== '').map(f => `* ${f.trim()}`).join('\n');const install = document.getElementById('installation').value || 'bash\nnpm install\n';const usage = document.getElementById('usage').value || 'bash\nnpm start\n';const license = document.getElementById('license').value || 'MIT';const output = `# ${title}\n\n${description}\n\n${features ? '## Features\n\n' + features + '\n\n' : ''}## Installation\n\n${install}\n\n## Usage\n\n${usage}\n\n## License\n\nThis project is licensed under the ${license} License - see the LICENSE.md file for details.\n\n[![GitHub license](https://img.shields.io/badge/license-${encodeURIComponent(license)}-blue.svg)](LICENSE.md)`;document.getElementById('output').textContent = output;});document.getElementById('copyBtn').addEventListener('click', function() {const outputText = document.getElementById('output').textContent;navigator.clipboard.writeText(outputText).then(() => {alert('Copied to clipboard!');}).catch(err => {console.error('Failed to copy: ', err);});});</script><footer><p>&copy; 2023 README Gen. All rights reserved.</p></footer></body></html>
