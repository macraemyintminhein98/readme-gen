<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README Gen</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-4">README Gen</h1>
        <p class="text-gray-600 mb-6">Craft the perfect README in seconds.</p>
        <form id="readmeForm" class="space-y-4">
            <input type="text" id="projectName" placeholder="Project Name" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <textarea id="description" placeholder="Description" rows="3" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            <select id="template" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="standard">Standard Template</option>
                <option value="modern">Modern Template</option>
                <option value="minimalist">Minimalist Template</option>
            </select>
            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition duration-200">Generate README</button>
        </form>
        <p class="text-sm text-gray-500 mt-6">Get started for just $9.99!</p>
    </div>
    <script>
      document.getElementById('readmeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        // In a real app, this would hit an API endpoint.
        // For this demo, we'll simulate the payment and generation flow.
        alert('Redirecting to secure payment... (Simulated)');
        window.location.href = 'https://buy.stripe.com/test_dR6dTycuX7nU6fG288'; // Example Stripe Link
      });
    </script>
</body>
</html>
